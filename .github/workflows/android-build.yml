name: Android CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      # قمنا بتثبيت الإصدار 8.5 ليتوافق مع أندرويد 14
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build with Gradle
      # لاحظ حذف نقطتين الرأس قبل assembleDebug لأن الملفات في المجلد الرئيسي
      run: ./gradlew assembleDebug
      
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AbuAlZahra-Child-App
        # هذا المسار سيبحث عن الـ APK في أي مكان تم إنتاجه فيه
        path: "**/build/outputs/apk/debug/*.apk"
