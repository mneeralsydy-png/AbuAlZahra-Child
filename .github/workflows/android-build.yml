name: Android CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Auto-Setup & Build
      run: |
        # 1. البحث عن المجلد الذي يحتوي على ملف settings.gradle
        PROJECT_ROOT=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
        echo "Found project at: $PROJECT_ROOT"
        cd $PROJECT_ROOT
        
        # 2. توليد الـ Wrapper إذا كان مفقوداً
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        
        # 3. تشغيل البناء مع اكتشاف الموديولات تلقائياً
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AbuAlZahra-Child-App
        path: "**/build/outputs/apk/debug/*.apk"
