name: Android CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK
      # ندخل للمجلد وننفذ كل الأوامر بداخله مرة واحدة
      run: |
        cd AbuAlZahra-Child
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App-Debug
        path: "**/build/outputs/apk/debug/*.apk"
